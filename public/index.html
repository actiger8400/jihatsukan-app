<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個別支援計画書 自動作成アシスタント（児発管向け）</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Markdown Parser & Sanitizer -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-circles">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
    </div>

    <div class="container">
        <header>
            <h1><i class="fa-solid fa-child-reaching"></i> 個別支援計画書アシスタント</h1>
            <p class="subtitle">児童の日々の様子から、専門的な支援計画のベースを自動作成します。</p>
        </header>

        <main>
            <div class="glass-panel input-section">
                <h2><i class="fa-solid fa-pen-to-square"></i> 児童の様子・特性を入力</h2>
                <form id="planForm">
                    <div class="form-group">
                        <label for="childProfile">基本情報（年齢、診断名、通所頻度など）※任意</label>
                        <input type="text" id="childProfile" placeholder="例: 5歳（年長）、自閉スペクトラム症、週3回利用">
                    </div>
                    <div class="form-group">
                        <label for="childStatus">日々の様子・気になる特性<span class="required">必須</span></label>
                        <textarea id="childStatus" rows="6" placeholder="例:&#10;・友達とおもちゃの貸し借りがうまくできず、トラブルになることが多い。&#10;・一方で、電車やブロックなど好きな物には長時間集中できる。&#10;・言葉の遅れがあり、二語文は出るが、要求を言葉で伝えるのが苦手。" required></textarea>
                    </div>
                    <button type="submit" id="generateBtn" class="primary-btn">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> 計画の素案を作成する
                    </button>
                </form>
            </div>

            <div class="glass-panel result-section hidden" id="resultContainer">
                <div class="result-header">
                    <h2><i class="fa-regular fa-clipboard"></i> 作成結果</h2>
                    <button id="copyBtn" class="secondary-btn"><i class="fa-regular fa-copy"></i> コピー</button>
                </div>
                <div id="loadingIndicator" class="hidden">
                    <div class="spinner"></div>
                    <p>AIが専門的な視点で作成中です...<br>しばらくお待ちください</p>
                </div>
                <div id="resultContent" class="markdown-body"></div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 個別支援計画書 自動作成アシスタント (AI Powered)</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
